name: Build Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: relax-ubuntu-latest
            binary_path: target/release/relax
          - os: windows-latest
            artifact_name: relax-windows-latest
            binary_path: target/release/relax.exe
          - os: macos-latest
            artifact_name: relax-macos-latest
            binary_path: target/release/relax
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run test suite
        run: cargo test --quiet

      - name: Build release binary
        run: cargo build --release -p relax-cli

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.binary_path }}" -DestinationPath "${{ matrix.artifact_name }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 14